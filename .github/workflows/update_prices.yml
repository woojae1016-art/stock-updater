name: 주가 자동 업데이트

on:
  schedule:
    # 매 시간 정각에 실행 (UTC 기준 → 한국시간 +9시간)
    # 예: UTC 00:00 = 한국 09:00
    - cron: '0 * * * *'
  workflow_dispatch:  # 수동으로도 실행 가능 (GitHub에서 버튼 클릭)

jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance requests python-dotenv

      - name: 주가 업데이트 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python update_stock_prices.py
