name: 주가 자동 업데이트

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [cron-trigger]
  
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   ← 이 줄 추가
  
jobs:
  update-prices:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install yfinance requests python-dotenv

      - name: 주가 업데이트 실행
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DB_ID: ${{ secrets.NOTION_DB_ID }}
        run: python update_stock_prices.py
